<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill & Stock Management Engine</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <div class="app-container" id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo-container">
        <span style="font-size: 28px;">🚀</span>
        Antigravity OS
      </div>
      
      <nav id="sidebar-nav">
        <a href="#dashboard" class="nav-link" data-route="dashboard">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </a>
        <a href="#products" class="nav-link" data-route="products">
          <i data-lucide="box"></i> Products & Stock
        </a>
        <a href="#customers" class="nav-link" data-route="customers">
          <i data-lucide="users"></i> Customers & Prices
        </a>
        <a href="#sales" class="nav-link" data-route="sales">
          <i data-lucide="shopping-cart"></i> Sales Orders
        </a>
        <a href="#purchases" class="nav-link" data-route="purchases">
          <i data-lucide="package"></i> Purchases (PO)
        </a>
        <a href="#billing" class="nav-link" data-route="billing">
          <i data-lucide="receipt"></i> Billing & Invoices
        </a>
        <a href="#reports" class="nav-link" data-route="reports">
          <i data-lucide="layout-dashboard"></i> Profit & Loss (P&L)
        </a>
        <!-- Staff link will be shown dynamically based on role -->
        <a href="#staff" class="nav-link" data-route="staff" id="nav-staff" style="display: none;">
          <i data-lucide="shield-alert"></i> Staff Accounts
        </a>
      </nav>

      <!-- Privacy Toggle at bottom of sidebar -->
      <div style="padding: 24px; display: flex; flex-direction: column; gap: 8px;">
        <button id="btn-privacy-toggle" class="btn" style="width: 100%; display: flex; gap: 8px; justify-content: center; background: var(--bg-secondary); border: 1px solid rgba(255,255,255,0.1);">
          <i data-lucide="eye"></i> <span>Hide Fin. Data</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- Pages will be injected here -->
    </main>
  </div>

  <!-- Login overlay removed -->

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/products.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/sales.js"></script>
  <script src="js/purchases.js"></script>
  <script src="js/billing.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/staff.js"></script>
</body>
</html>
